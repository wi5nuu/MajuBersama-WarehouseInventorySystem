openapi: "3.0.3"
info:
  title: Inventory Management System API
  description: REST API for PT. Maju Bersama warehouse inventory management
  version: "1.0.0"
  contact:
    name: PT. Maju Bersama
    email: it@maju-bersama.co.id

servers:
  - url: http://localhost:8080/api/v1
    description: Local development

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        type:
          type: string
          example: about:blank
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        errors:
          type: array
          items:
            type: string

    Item:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        category_id:
          type: string
          format: uuid
        supplier_id:
          type: string
          format: uuid
        unit_price:
          type: object
          properties:
            amount:
              type: integer
            currency:
              type: string
        stock:
          type: object
          properties:
            quantity:
              type: integer
            unit:
              type: string
        min_stock:
          type: object
          properties:
            quantity:
              type: integer
            unit:
              type: string
        status:
          type: string
          enum: [active, inactive, discontinued, out_of_stock]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateItemRequest:
      type: object
      required: [sku, name, unit_price_amount, stock_quantity]
      properties:
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        category_id:
          type: string
          format: uuid
        supplier_id:
          type: string
          format: uuid
        unit_price_amount:
          type: integer
        currency:
          type: string
          default: IDR
        stock_quantity:
          type: integer
        min_stock_quantity:
          type: integer
          default: 0
        stock_unit:
          type: string
          default: pcs

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, manager, operator, viewer]
        is_active:
          type: boolean

paths:
  /auth/login:
    post:
      tags: [Authentication]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /items:
    get:
      tags: [Items]
      summary: List all items
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            default: 20
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: category_id
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          schema:
            type: string
      responses:
        '200':
          description: List of items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Item'
                  total_count:
                    type: integer
                  page:
                    type: integer
                  page_size:
                    type: integer
                  total_pages:
                    type: integer

    post:
      tags: [Items]
      summary: Create a new item
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '400':
          description: Validation error
        '409':
          description: Duplicate SKU

  /items/{id}:
    get:
      tags: [Items]
      summary: Get item by ID
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Item details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '404':
          description: Item not found

    put:
      tags: [Items]
      summary: Update item
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
      responses:
        '200':
          description: Item updated

    delete:
      tags: [Items]
      summary: Delete item
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Item deleted
        '404':
          description: Item not found

    patch:
      tags: [Items]
      summary: Partially update item
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                unit_price_amount:
                  type: integer
                stock_quantity:
                  type: integer
                min_stock_quantity:
                  type: integer
                status:
                  type: string
      responses:
        '200':
          description: Item updated
